apply plugin: 'application'

dependencies {
    implementation project(':core')
    implementation "com.badlogicgames.gdx:gdx-backend-lwjgl3:1.13.0"
    implementation "com.badlogicgames.gdx:gdx-platform:1.13.0:natives-desktop"
    implementation "com.badlogicgames.gdx:gdx-freetype-platform:1.13.0:natives-desktop"
    implementation "com.badlogicgames.gdx-video:gdx-video-lwjgl3:1.3.4"
}

application {
    mainClass = 'com.td.game.lwjgl3.Lwjgl3Launcher'
}

jar {
    dependsOn ':core:jar'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    manifest {
        attributes 'Main-Class': 'com.td.game.lwjgl3.Lwjgl3Launcher'
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}

run {
    workingDir = project.projectDir.parentFile.absolutePath + '/assets'
    ignoreExitValue = true
    if (org.gradle.internal.os.OperatingSystem.current().isMacOsX()) {
        jvmArgs += "-XstartOnFirstThread"
    }
}
